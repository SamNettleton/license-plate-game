name: Run Unit Tests

on:
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  test-backend:
    name: Backend Tests (pytest)
    env:
      DATABASE_URL: sqlite:///./test.db # default value for testing to satisfy postgres dependency
      ENABLE_METRICS: 'false'
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Run tests
        run: PYTHONPATH=$(pwd) pytest -v
        working-directory: backend

  test-frontend:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests
        run: npm run test -- --run
        working-directory: frontend

  required-status-check:
    name: All Tests Passed
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: always() # This ensures it runs even if previous jobs were skipped
    steps:
      - name: Check status of individual tests
        run: |
          BACKEND_STATUS="${{ needs.test-backend.result }}"
          FRONTEND_STATUS="${{ needs.test-frontend.result }}"

          # Logic: Fail if any job failed. Success if jobs were "success" OR "skipped"
          if [[ "$BACKEND_STATUS" == "failure" || "$FRONTEND_STATUS" == "failure" ]]; then
            echo "One or more tests failed."
            exit 1
          fi
          echo "All relevant tests passed or were skipped correctly."
